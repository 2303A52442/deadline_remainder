<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-6">

      <div class="card shadow">

        <div class="card-body p-4">

          <h2 class="text-center mb-4">
            Deadline Reminder Signup
          </h2>

          <form id="signupForm">

            <div class="mb-3">
              <input
                type="text"
                id="name"
                class="form-control"
                placeholder="Enter Name"
                required
              >
            </div>

            <div class="mb-3">
              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="Enter Email"
                required
              >
            </div>

            <div class="mb-3">
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Enter Password"
                required
              >
            </div>

            <button
              type="submit"
              class="btn btn-primary w-100"
            >
              Signup
            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="./js/signup.js"></script>

</body>
</html>
