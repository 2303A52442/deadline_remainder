<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Edit Reminder</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
<div class="container">
<span class="navbar-brand">
Edit Reminder
</span>
</div>
</nav>

<div class="container mt-5">

<div class="card shadow">
<div class="card-body">

<h2 class="mb-4">
Edit Reminder
</h2>

<form id="editForm">

<input
type="text"
id="title"
class="form-control mb-3"
placeholder="Title"
required
>

<textarea
id="description"
class="form-control mb-3"
placeholder="Description"
required
></textarea>

<input
type="date"
id="deadline"
class="form-control mb-3"
required
>

<button
type="submit"
class="btn btn-success"
>
Update Reminder
</button>

</form>

</div>
</div>

</div>

<script src="./js/editReminder.js"></script>

</body>
</html>
