<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Reminder</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <span class="navbar-brand">
      Deadline Reminder
    </span>
  </div>
</nav>

<div class="container mt-5">

  <div class="card shadow">

    <div class="card-body">

      <h2 class="mb-4">
        Add Reminder
      </h2>

      <form id="reminderForm">

        <div class="mb-3">
          <input
            type="text"
            id="title"
            class="form-control"
            placeholder="Reminder Title"
            required
          >
        </div>

        <div class="mb-3">
          <textarea
            id="description"
            class="form-control"
            rows="4"
            placeholder="Description"
            required
          ></textarea>
        </div>

        <div class="mb-3">
          <input
            type="date"
            id="deadline"
            class="form-control"
            required
          >
        </div>

        <button
          type="submit"
          class="btn btn-success"
        >
          Add Reminder
        </button>

      </form>

    </div>

  </div>

</div>

<script type="module" src="./js/reminder.js"></script>

</body>
</html>
